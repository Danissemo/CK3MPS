name: Refresh brand assets

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: brand-assets-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    name: Generate brand assets preview
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Generate presentation assets
        shell: pwsh
        run: ./scripts/generate-brand-assets.ps1

      - name: Upload generated assets preview
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: generated-brand-assets
          path: |
            assets/app.ico
            assets/app_icon.png
            assets/social-preview.png
          if-no-files-found: error
          retention-days: 14
