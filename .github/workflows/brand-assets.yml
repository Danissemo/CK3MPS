name: Refresh brand assets

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - scripts/generate-brand-assets.ps1
      - .github/workflows/brand-assets.yml

permissions:
  contents: write

jobs:
  generate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate presentation assets
        shell: pwsh
        run: ./scripts/generate-brand-assets.ps1

      - name: Commit generated files
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/app.ico assets/app_icon.png assets/social-preview.png
          if (git diff --cached --quiet) {
            Write-Host "Brand assets are already current."
            exit 0
          }
          git commit -m "Refresh CK3MPS visual assets"
          git push
