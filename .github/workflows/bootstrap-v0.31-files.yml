name: Bootstrap v0.31 release files

on:
  push:
    branches: [agent/v0.31-release-files]
    paths: [.github/workflows/bootstrap-v0.31-files.yml]

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/v0.31-release-files
          fetch-depth: 0
      - shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $p = 'source/AppState.cs'
          $c = Get-Content $p -Raw
          $n = $c -replace 'private const string AppVersion = "v0\.3";', 'private const string AppVersion = "v0.31";'
          if ($n -eq $c) { throw 'AppVersion v0.3 not found.' }
          Set-Content $p $n -Encoding UTF8

          $p = 'CK3MPS.csproj'
          $c = Get-Content $p -Raw
          $n = $c -replace '<Version>0\.3\.0</Version>', '<Version>0.31.0</Version>'
          if ($n -eq $c) { throw 'Project version 0.3.0 not found.' }
          Set-Content $p $n -Encoding UTF8

          $entry = @'
          ## v0.31

          - Added recoverable, journaled portable-mode migration with checksum verification, rollback, startup recovery, and failure-injection coverage.
          - Added transactional multi-item restore batches with reverse snapshots, manifest rollback, safer same-parent directory replacement, and clearer rollback diagnostics.
          - Hardened Workflow refreshes with cancellation, generation checks, immutable snapshots, bounded save/OOS analysis, and improved race-condition handling.
          - Added authenticated parity-room exchange over loopback or a selected private LAN IPv4 endpoint with encryption/signatures, replay protection, peer/client limits, payload bounds, and rate limiting.
          - Standardized checklist behavior around stable `StepCatalog` identifiers, preset validation, and regression coverage.
          - Strengthened CI and release gates with deterministic full-test orchestration, build-output verification, strict mutation review, exact tag/version matching, and packaging from tested artifacts.
          - Updated architecture, testing, release, security, support, and repository documentation.

          '@
          $p = 'CHANGELOG.md'
          $c = Get-Content $p -Raw
          if ($c -notmatch '## Unreleased') { throw 'Unreleased section missing.' }
          if ($c -notmatch '## v0\.31') {
            Set-Content $p ($c -replace '## Unreleased\r?\n', "## Unreleased`r`n`r`n$entry") -Encoding UTF8
          }

          @'
          ## Highlights

          - Portable mode migration is now journaled and recoverable after interrupted state-root moves.
          - Restore operations now run as transactional batches with reverse snapshots and manifest rollback.
          - Workflow analysis is cancelable and snapshot-consistent, with bounded save and OOS processing.
          - Parity rooms support loopback or a selected private LAN IPv4 endpoint with authenticated encrypted messages, replay protection, payload limits, peer/client limits, and rate limiting.
          - Checklist actions use stable StepCatalog identifiers across presets, tests, and documentation.
          - CI and release publishing use deterministic test orchestration, strict mutation review, exact tag/version validation, and packaging from tested artifacts.

          ## Included Files

          ```text
          CK3MPS.exe
          CK3MPS.exe.sha256
          CK3MPS-v0.31.zip
          CK3MPS-v0.31.zip.sha256
          ```

          ## Recommended Usage

          1. Close CK3 and Paradox Launcher.
          2. Start CK3MPS as administrator.
          3. Run Scan, review the plan, then Apply Settings.
          4. Review Workflow, Restore, Reports, and readiness output before multiplayer.

          ## Notes

          - Reopen CK3MPS after an interrupted migration or restore so recovery can inspect preserved journals and snapshots.
          - Test LAN parity on the real Windows machines and network because firewall, router, VPN, and adapter configuration vary.
          '@ | Set-Content 'docs/release-notes-v0.31.md' -Encoding UTF8

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm .github/workflows/bootstrap-v0.31-files.yml
          git add source/AppState.cs CK3MPS.csproj CHANGELOG.md docs/release-notes-v0.31.md
          git commit -m 'Prepare v0.31 release files'
          git push origin HEAD:agent/v0.31-release-files
