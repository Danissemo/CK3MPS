name: Build CityInBox APK

on:
  push:
    branches: [ city-in-box-apk-build ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'
      - name: Build Android APK
        run: gradle -p city-in-box --no-daemon :app:assembleDebug
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: city-in-box-apk
          path: city-in-box/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
      - name: Publish APK to build branch
        run: |
          mkdir -p city-in-box/dist
          cp city-in-box/app/build/outputs/apk/debug/app-debug.apk city-in-box/dist/CityInBox.apk
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add city-in-box/dist/CityInBox.apk
          git commit -m "Publish CityInBox APK [skip ci]"
          git push origin HEAD:city-in-box-apk-build
