name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@6fb02220983dee41ce7ae257b6f4d8f9bf5ed4ce

      - name: Build release artifacts
        shell: pwsh
        run: |
          ./scripts/build.ps1 -UpdateReleaseArtifacts
          ./scripts/test.ps1
          ./scripts/check-version-consistency.ps1
          ./scripts/check-repo-clean.ps1
          ./scripts/validate-release.ps1
          ./scripts/package-release.ps1

      - name: Resolve release metadata
        id: meta
        shell: pwsh
        run: |
          $versionLine = Select-String -Path source/AppState.cs -Pattern 'AppVersion = "([^"]+)"' | Select-Object -First 1
          $version = [regex]::Match($versionLine.Line, 'AppVersion = "([^"]+)"').Groups[1].Value
          "version=$version" >> $env:GITHUB_OUTPUT
          "notes=docs/release-notes-$version.md" >> $env:GITHUB_OUTPUT

      - name: Publish GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          tag_name: ${{ steps.meta.outputs.version }}
          name: CK3MPS ${{ steps.meta.outputs.version }}
          body_path: ${{ steps.meta.outputs.notes }}
          files: |
            release/CK3MPS.exe
            release/CK3MPS.exe.sha256
            ../CK3MPS_exports/CK3MPS-${{ steps.meta.outputs.version }}.zip
            ../CK3MPS_exports/CK3MPS-${{ steps.meta.outputs.version }}.zip.sha256
