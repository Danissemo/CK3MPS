name: Release

on:
  workflow_run:
    workflows: ["Build"]
    types: [completed]
  workflow_dispatch:
    inputs:
      ci_run_id:
        description: "Successful Build workflow run id to publish from"
        required: true
        type: string
      commit_sha:
        description: "Commit SHA that the Build run tested"
        required: true
        type: string

permissions:
  contents: read
  actions: read

concurrency:
  group: release-${{ github.event.workflow_run.head_sha || inputs.commit_sha }}
  cancel-in-progress: false

jobs:
  validate_release_candidate:
    name: Validate tested release candidate
    runs-on: windows-latest
    timeout-minutes: 20
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.head_branch == 'main'
        )
      }}
    outputs:
      version: ${{ steps.gate.outputs.version }}
      candidate_sha: ${{ steps.gate.outputs.candidate_sha }}
      release_notes: ${{ steps.gate.outputs.release_notes }}

    steps:
      - name: Resolve CI run metadata
        id: runmeta
        shell: pwsh
        env:
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
          WORKFLOW_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          WORKFLOW_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          INPUT_RUN_ID: ${{ inputs.ci_run_id }}
          INPUT_COMMIT_SHA: ${{ inputs.commit_sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'

          if ($env:EVENT_NAME -eq 'workflow_dispatch') {
            if ([string]::IsNullOrWhiteSpace($env:INPUT_RUN_ID)) { throw 'ci_run_id input is required.' }
            if ([string]::IsNullOrWhiteSpace($env:INPUT_COMMIT_SHA)) { throw 'commit_sha input is required.' }

            $run = gh run view $env:INPUT_RUN_ID --json conclusion,headSha,headBranch,name,event | ConvertFrom-Json
            if ($run.name -ne 'Build') { throw "Run $env:INPUT_RUN_ID is not the Build workflow. Actual workflow: $($run.name)" }
            if ($run.conclusion -ne 'success') { throw "Build run $env:INPUT_RUN_ID is not green. Conclusion: $($run.conclusion)" }
            if ($run.headBranch -ne 'main') { throw "Release can only publish a Build run from main. Actual branch: $($run.headBranch)" }
            if ($run.headSha -ne $env:INPUT_COMMIT_SHA) {
              throw "Input commit_sha does not match Build run head SHA. Input=$env:INPUT_COMMIT_SHA Run=$($run.headSha)"
            }

            "run_id=$env:INPUT_RUN_ID" >> $env:GITHUB_OUTPUT
            "candidate_sha=$($run.headSha)" >> $env:GITHUB_OUTPUT
          } else {
            if ([string]::IsNullOrWhiteSpace($env:WORKFLOW_RUN_ID)) { throw 'workflow_run id is missing.' }
            if ([string]::IsNullOrWhiteSpace($env:WORKFLOW_HEAD_SHA)) { throw 'workflow_run head SHA is missing.' }
            if ($env:WORKFLOW_HEAD_BRANCH -ne 'main') { throw "Release can only publish Build runs from main. Actual branch: $env:WORKFLOW_HEAD_BRANCH" }

            "run_id=$env:WORKFLOW_RUN_ID" >> $env:GITHUB_OUTPUT
            "candidate_sha=$env:WORKFLOW_HEAD_SHA" >> $env:GITHUB_OUTPUT
          }

      - name: Checkout tested commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ steps.runmeta.outputs.candidate_sha }}
          fetch-depth: 0

      - name: Download tested executable
        uses: actions/download-artifact@v4
        with:
          name: CK3MPS-exe
          path: release-assets
          run-id: ${{ steps.runmeta.outputs.run_id }}
          github-token: ${{ github.token }}

      - name: Download tested release zip
        uses: actions/download-artifact@v4
        with:
          name: CK3MPS-release-zip
          path: release-assets
          run-id: ${{ steps.runmeta.outputs.run_id }}
          github-token: ${{ github.token }}

      - name: Download tested checksums
        uses: actions/download-artifact@v4
        with:
          name: CK3MPS-release-checksums
          path: release-assets
          run-id: ${{ steps.runmeta.outputs.run_id }}
          github-token: ${{ github.token }}

      - name: Verify release gate
        id: gate
        shell: pwsh
        env:
          CANDIDATE_SHA: ${{ steps.runmeta.outputs.candidate_sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'

          $versionLine = Select-String -Path source/AppState.cs -Pattern 'AppVersion = "([^"]+)"' | Select-Object -First 1
          if (-not $versionLine) { throw 'Could not parse AppVersion.' }
          $version = [regex]::Match($versionLine.Line, 'AppVersion = "([^"]+)"').Groups[1].Value
          if ([string]::IsNullOrWhiteSpace($version)) { throw 'AppVersion is empty.' }
          if ($version -notmatch '^v\d+\.\d+(\.\d+)?$') { throw "AppVersion must be a release tag like v0.31. Actual: $version" }

          $notes = "docs/release-notes-$version.md"
          if (-not (Test-Path -LiteralPath $notes -PathType Leaf)) { throw "Release notes are missing: $notes" }

          git fetch --force origin "refs/tags/$version:refs/tags/$version"
          $tagCommit = (git rev-list -n 1 $version).Trim()
          if ($tagCommit -ne $env:CANDIDATE_SHA) {
            throw "Release tag $version does not point to the tested commit. Tag=$tagCommit Tested=$env:CANDIDATE_SHA"
          }

          $requiredFiles = @(
            'CK3MPS.exe',
            'CK3MPS.exe.sha256',
            "CK3MPS-$version.zip",
            "CK3MPS-$version.zip.sha256"
          )
          foreach ($name in $requiredFiles) {
            $path = Join-Path 'release-assets' $name
            if (-not (Test-Path -LiteralPath $path -PathType Leaf)) {
              throw "Required tested release artifact is missing: $path"
            }
          }

          foreach ($checksum in Get-ChildItem -LiteralPath release-assets -Filter '*.sha256' -File) {
            $line = Get-Content -LiteralPath $checksum.FullName -Raw
            if ($line -notmatch '^(?<hash>[0-9a-fA-F]{64})\s+\*?(?<name>.+)$') {
              throw "Malformed checksum file: $($checksum.FullName)"
            }

            $artifactPath = Join-Path $checksum.DirectoryName $Matches.name.Trim()
            if (-not (Test-Path -LiteralPath $artifactPath -PathType Leaf)) {
              throw "Checksum target is missing: $artifactPath"
            }

            $actual = (Get-FileHash -LiteralPath $artifactPath -Algorithm SHA256).Hash.ToLowerInvariant()
            $expected = $Matches.hash.ToLowerInvariant()
            if ($actual -ne $expected) {
              throw "Checksum mismatch for $artifactPath. Expected $expected but got $actual."
            }
          }

          $releaseExists = $true
          gh release view $version *> $null
          if ($LASTEXITCODE -ne 0) { $releaseExists = $false }

          if ($releaseExists) {
            $release = gh release view $version --json assets | ConvertFrom-Json
            $existingNames = @($release.assets | ForEach-Object { $_.name })
            $duplicates = @($requiredFiles | Where-Object { $_ -in $existingNames })
            if ($duplicates.Count -gt 0) {
              throw "Release $version already has asset(s): $($duplicates -join ', '). Refusing to overwrite existing release assets."
            }
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "candidate_sha=$env:CANDIDATE_SHA" >> $env:GITHUB_OUTPUT
          "release_notes=$notes" >> $env:GITHUB_OUTPUT

      - name: Upload release gate diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-gate-diagnostics
          path: release-assets/**
          if-no-files-found: warn
          retention-days: 14

  publish_release:
    name: Publish verified GitHub release
    runs-on: windows-latest
    needs: validate_release_candidate
    timeout-minutes: 15
    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout tested commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ needs.validate_release_candidate.outputs.candidate_sha }}
          fetch-depth: 0

      - name: Download tested executable
        uses: actions/download-artifact@v4
        with:
          name: CK3MPS-exe
          path: release-assets
          run-id: ${{ github.event.workflow_run.id || inputs.ci_run_id }}
          github-token: ${{ github.token }}

      - name: Download tested release zip
        uses: actions/download-artifact@v4
        with:
          name: CK3MPS-release-zip
          path: release-assets
          run-id: ${{ github.event.workflow_run.id || inputs.ci_run_id }}
          github-token: ${{ github.token }}

      - name: Download tested checksums
        uses: actions/download-artifact@v4
        with:
          name: CK3MPS-release-checksums
          path: release-assets
          run-id: ${{ github.event.workflow_run.id || inputs.ci_run_id }}
          github-token: ${{ github.token }}

      - name: Publish GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          tag_name: ${{ needs.validate_release_candidate.outputs.version }}
          target_commitish: ${{ needs.validate_release_candidate.outputs.candidate_sha }}
          name: CK3MPS ${{ needs.validate_release_candidate.outputs.version }}
          body_path: ${{ needs.validate_release_candidate.outputs.release_notes }}
          fail_on_unmatched_files: true
          files: |
            release-assets/CK3MPS.exe
            release-assets/CK3MPS.exe.sha256
            release-assets/CK3MPS-${{ needs.validate_release_candidate.outputs.version }}.zip
            release-assets/CK3MPS-${{ needs.validate_release_candidate.outputs.version }}.zip.sha256
