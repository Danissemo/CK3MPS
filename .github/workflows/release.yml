name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build, validate, sign, and publish release
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@6fb02220983dee41ce7ae257b6f4d8f9bf5ed4ce

      - name: Build
        shell: pwsh
        run: ./scripts/build.ps1

      - name: Verify build output
        shell: pwsh
        run: |
          if (-not (Test-Path -LiteralPath ./bin/CK3MPS.exe -PathType Leaf)) {
            throw 'Build completed without bin\CK3MPS.exe.'
          }
          Write-Host 'Verified build output: bin\CK3MPS.exe'

      - name: Run all tests
        shell: pwsh
        run: ./scripts/test-all.ps1

      - name: Strict mutation review
        shell: pwsh
        run: ./scripts/check-static-danger-strict.ps1

      - name: Validate release gates
        shell: pwsh
        run: |
          ./scripts/check-version-consistency.ps1 -RequireReleaseTag
          ./scripts/validate-release.ps1

      - name: Authenticode sign tested executable
        shell: pwsh
        env:
          CK3MPS_SIGNING_CERT_BASE64: ${{ secrets.CK3MPS_SIGNING_CERT_BASE64 }}
          CK3MPS_SIGNING_CERT_PASSWORD: ${{ secrets.CK3MPS_SIGNING_CERT_PASSWORD }}
        run: |
          ./scripts/sign-release.ps1 `
            -CertificateBase64 $env:CK3MPS_SIGNING_CERT_BASE64 `
            -CertificatePassword $env:CK3MPS_SIGNING_CERT_PASSWORD

      - name: Verify signed startup health mode
        shell: pwsh
        run: |
          $token = Join-Path $env:RUNNER_TEMP 'ck3mps-release-health.ok'
          Remove-Item -LiteralPath $token -Force -ErrorAction SilentlyContinue
          $process = Start-Process -FilePath ./bin/CK3MPS.exe -ArgumentList '--update-health-check', $token -PassThru -Wait
          if ($process.ExitCode -ne 0 -or -not (Test-Path -LiteralPath $token -PathType Leaf)) {
            throw 'Signed executable failed updater health-check mode.'
          }

      - name: Package signed release artifacts
        shell: pwsh
        run: ./scripts/package-release.ps1 -SkipBuild -RequireSignature

      - name: Resolve release metadata
        id: meta
        shell: pwsh
        run: |
          $versionLine = Select-String -Path source/AppState.cs -Pattern 'AppVersion = "([^"]+)"' | Select-Object -First 1
          if (-not $versionLine) { throw 'Could not parse AppVersion.' }
          $version = [regex]::Match($versionLine.Line, 'AppVersion = "([^"]+)"').Groups[1].Value
          if ([string]::IsNullOrWhiteSpace($version)) { throw 'AppVersion is empty.' }
          "version=$version" >> $env:GITHUB_OUTPUT
          "asset_version=$($version.TrimStart('v','V'))" >> $env:GITHUB_OUTPUT
          "notes=docs/release-notes-$version.md" >> $env:GITHUB_OUTPUT

      - name: Publish GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          tag_name: ${{ steps.meta.outputs.version }}
          name: CK3MPS ${{ steps.meta.outputs.version }}
          body_path: ${{ steps.meta.outputs.notes }}
          files: |
            release/CK3MPS.exe
            release/CK3MPS.exe.sha256
            ../CK3MPS_exports/CK3MPS-${{ steps.meta.outputs.asset_version }}.zip
            ../CK3MPS_exports/CK3MPS-${{ steps.meta.outputs.asset_version }}.zip.sha256
            ../CK3MPS_exports/CK3MPS-${{ steps.meta.outputs.asset_version }}.zip.manifest.json
