name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build, validate, and publish release
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@6fb02220983dee41ce7ae257b6f4d8f9bf5ed4ce

      - name: Build
        shell: pwsh
        run: ./scripts/build.ps1

      - name: Verify build output
        shell: pwsh
        run: |
          if (-not (Test-Path -LiteralPath ./bin/CK3MPS.exe -PathType Leaf)) {
            throw 'Build completed without bin\CK3MPS.exe.'
          }
          Write-Host 'Verified build output: bin\CK3MPS.exe'

      - name: Run all tests
        shell: pwsh
        run: ./scripts/test-all.ps1

      - name: Strict mutation review
        shell: pwsh
        run: ./scripts/check-static-danger-strict.ps1

      - name: Validate release gates
        shell: pwsh
        run: |
          ./scripts/check-version-consistency.ps1 -RequireReleaseTag
          ./scripts/validate-release.ps1

      - name: Package tested release artifacts
        shell: pwsh
        run: ./scripts/package-release.ps1 -SkipBuild

      - name: Resolve release metadata
        id: meta
        shell: pwsh
        run: |
          $versionLine = Select-String -Path source/AppState.cs -Pattern 'AppVersion = "([^"]+)"' | Select-Object -First 1
          if (-not $versionLine) { throw 'Could not parse AppVersion.' }
          $version = [regex]::Match($versionLine.Line, 'AppVersion = "([^"]+)"').Groups[1].Value
          if ([string]::IsNullOrWhiteSpace($version)) { throw 'AppVersion is empty.' }
          "version=$version" >> $env:GITHUB_OUTPUT
          "notes=docs/release-notes-$version.md" >> $env:GITHUB_OUTPUT

      - name: Publish GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          tag_name: ${{ steps.meta.outputs.version }}
          name: CK3MPS ${{ steps.meta.outputs.version }}
          body_path: ${{ steps.meta.outputs.notes }}
          files: |
            release/CK3MPS.exe
            release/CK3MPS.exe.sha256
            ../CK3MPS_exports/CK3MPS-${{ steps.meta.outputs.version }}.zip
            ../CK3MPS_exports/CK3MPS-${{ steps.meta.outputs.version }}.zip.sha256
