name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, agent/fix-hardening-gaps]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  version-diagnostic:
    name: Version consistency diagnostic
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Capture version consistency diagnostics
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .diagnostics | Out-Null
          try {
            ./scripts/check-version-consistency.ps1 *>&1 | Tee-Object -FilePath .diagnostics/version-consistency.log
          }
          catch {
            $_ | Out-String | Add-Content -Path .diagnostics/version-consistency.log
            throw
          }

      - name: Upload version diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: version-consistency-diagnostics
          path: .diagnostics/version-consistency.log
          if-no-files-found: warn
