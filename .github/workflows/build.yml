name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Windows build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build
        shell: pwsh
        run: ./scripts/build.ps1

      - name: Package release zip
        shell: pwsh
        run: ./scripts/package-release.ps1

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: CK3MPS-exe
          path: release/CK3MPS.exe

      - name: Upload release zip
        uses: actions/upload-artifact@v4
        with:
          name: CK3MPS-release-zip
          path: ../CK3MPS_exports/*.zip
