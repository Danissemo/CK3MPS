name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-runtime-hardening:
    name: Apply runtime hardening
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/fix-hardening-gaps'
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/fix-hardening-gaps
          fetch-depth: 0

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@6fb02220983dee41ce7ae257b6f4d8f9bf5ed4ce

      - name: Apply runtime patches
        shell: pwsh
        run: |
          ./scripts/apply-runtime-hardening.ps1
          ./scripts/apply-runtime-hardening-fixes.ps1
          ./scripts/apply-runtime-hardening-lan-fix.ps1

      - name: Build patched sources
        shell: pwsh
        run: ./scripts/build.ps1

      - name: Run integration tests
        id: integration
        continue-on-error: true
        shell: pwsh
        run: ./scripts/test-required-ci.ps1

      - name: Upload integration diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: runtime-hardening-integration-${{ github.run_id }}
          path: .artifacts/integration-test-tail.txt

      - name: Stop after integration failure
        if: steps.integration.outcome == 'failure'
        shell: pwsh
        run: throw 'Required integration test suite failed. See the uploaded diagnostics artifact.'

      - name: Run transactional tests
        shell: pwsh
        run: ./scripts/test-transactional-hardening.ps1

      - name: Stage changes and refresh mutation-review pins
        shell: pwsh
        run: |
          git add -A
          $reviewScript = 'scripts/check-static-danger-strict.ps1'
          $text = [IO.File]::ReadAllText($reviewScript)
          $reviewedPaths = @(
            'source/AppConfig.cs',
            'source/Cleanup.cs',
            'source/GameSettings.cs',
            'source/Helpers.cs',
            'source/Launchers.cs',
            'source/Readiness.cs',
            'source/Reports.cs',
            'source/SaveAnalysis.cs',
            'source/Workflow.cs'
          )
          foreach ($relativePath in $reviewedPaths) {
            $sha = (git rev-parse ":$relativePath").Trim()
            if ($LASTEXITCODE -ne 0 -or $sha -notmatch '^[0-9a-f]{40}$') {
              throw "Could not resolve staged blob for $relativePath"
            }
            $escaped = [regex]::Escape($relativePath)
            $pattern = "(?m)^(\s*'$escaped'\s*=\s*')[0-9a-f]{40}(')"
            $regex = New-Object Text.RegularExpressions.Regex($pattern)
            if ($regex.Matches($text).Count -ne 1) {
              throw "Could not locate exactly one mutation-review pin for $relativePath"
            }
            $text = $regex.Replace($text, "`$1$sha`$2", 1)
          }
          [IO.File]::WriteAllText($reviewScript, $text, (New-Object Text.UTF8Encoding($false)))
          git add $reviewScript

      - name: Commit patched sources
        shell: pwsh
        run: |
          if (-not (git diff --cached --quiet)) {
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git commit -m 'Apply runtime hardening patches'
            git push origin HEAD:agent/fix-hardening-gaps
          }

  build:
    name: Windows build
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@6fb02220983dee41ce7ae257b6f4d8f9bf5ed4ce

      - name: Build
        shell: pwsh
        run: ./scripts/build.ps1

      - name: Test
        shell: pwsh
        run: ./scripts/test-required.ps1

      - name: Strict mutation review
        shell: pwsh
        run: ./scripts/check-static-danger-strict.ps1

      - name: Validate release metadata
        shell: pwsh
        run: ./scripts/validate-release.ps1

      - name: Package release zip
        shell: pwsh
        run: |
          ./scripts/package-release.ps1
          New-Item -ItemType Directory -Force -Path .artifacts | Out-Null
          Copy-Item ../CK3MPS_exports/*.zip .artifacts/
          Copy-Item ../CK3MPS_exports/*.sha256 .artifacts/
          Copy-Item release/CK3MPS.exe.sha256 .artifacts/

      - name: Upload executable
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: CK3MPS-exe
          path: release/CK3MPS.exe

      - name: Upload release zip
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: CK3MPS-release-zip
          path: .artifacts/*.zip

      - name: Upload release checksums
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: CK3MPS-release-checksums
          path: .artifacts/*.sha256
