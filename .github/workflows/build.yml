name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Windows legacy and modern validation
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@6fb02220983dee41ce7ae257b6f4d8f9bf5ed4ce

      - name: Setup modern .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build legacy .NET Framework client
        shell: pwsh
        run: ./scripts/build.ps1

      - name: Verify legacy build output
        shell: pwsh
        run: |
          if (-not (Test-Path -LiteralPath ./bin/CK3MPS.exe -PathType Leaf)) {
            throw 'Legacy build completed without bin\CK3MPS.exe.'
          }
          Write-Host 'Verified legacy build output: bin\CK3MPS.exe'

      - name: Build shared core
        shell: pwsh
        run: dotnet build ./CK3MPS.SharedCore.csproj --configuration Release

      - name: Build modern Windows client
        shell: pwsh
        run: dotnet build ./CK3MPS.Modern.csproj --configuration Release

      - name: Run modern shared-core characterization tests
        shell: pwsh
        run: dotnet run --project ./tests/CK3MPS.SharedCore.Tests.csproj --configuration Release

      - name: Run legacy test suite
        shell: pwsh
        run: ./scripts/test-all.ps1

      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: test-script-diagnostics
          path: bin/test-logs/*.log
          if-no-files-found: warn

      - name: Strict mutation review
        shell: pwsh
        run: ./scripts/check-static-danger-strict.ps1

      - name: Validate version consistency
        shell: pwsh
        run: ./scripts/check-version-consistency.ps1

      - name: Validate release metadata
        shell: pwsh
        run: ./scripts/validate-release.ps1

      - name: Package tested legacy release artifacts
        shell: pwsh
        run: |
          ./scripts/package-release.ps1 -SkipBuild
          New-Item -ItemType Directory -Force -Path .artifacts | Out-Null
          Copy-Item ../CK3MPS_exports/*.zip .artifacts/
          Copy-Item ../CK3MPS_exports/*.sha256 .artifacts/
          Copy-Item release/CK3MPS.exe.sha256 .artifacts/

      - name: Upload legacy executable
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: CK3MPS-legacy-net48-exe
          path: release/CK3MPS.exe

      - name: Upload modern compile candidate
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: CK3MPS-modern-net8-compile-candidate
          path: bin/Release/net8.0-windows/**
          if-no-files-found: error

      - name: Upload release zip
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: CK3MPS-legacy-release-zip
          path: .artifacts/*.zip

      - name: Upload release checksums
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: CK3MPS-legacy-release-checksums
          path: .artifacts/*.sha256
