name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Windows build
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@6fb02220983dee41ce7ae257b6f4d8f9bf5ed4ce

      - name: Build
        shell: pwsh
        run: ./scripts/build.ps1

      - name: Integration tests
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .diagnostics | Out-Null
          try {
            ./scripts/test-required.ps1 *>&1 | Tee-Object -FilePath .diagnostics/integration-tests.log
          }
          catch {
            $_ | Out-String | Add-Content -Path .diagnostics/integration-tests.log
            throw
          }

      - name: Upload integration diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: integration-test-diagnostics
          path: .diagnostics/integration-tests.log
          if-no-files-found: warn

      - name: Transactional recovery tests
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .diagnostics | Out-Null
          try {
            ./scripts/test-transactional-hardening.ps1 *>&1 | Tee-Object -FilePath .diagnostics/transactional-tests.log
          }
          catch {
            $_ | Out-String | Add-Content -Path .diagnostics/transactional-tests.log
            throw
          }

      - name: Upload transactional diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: transactional-test-diagnostics
          path: .diagnostics/transactional-tests.log
          if-no-files-found: warn

      - name: Strict mutation review
        shell: pwsh
        run: ./scripts/check-static-danger-strict.ps1

      - name: Validate release metadata
        shell: pwsh
        run: ./scripts/validate-release.ps1

      - name: Package release zip
        shell: pwsh
        run: |
          ./scripts/package-release.ps1
          New-Item -ItemType Directory -Force -Path .artifacts | Out-Null
          Copy-Item ../CK3MPS_exports/*.zip .artifacts/
          Copy-Item ../CK3MPS_exports/*.sha256 .artifacts/
          Copy-Item release/CK3MPS.exe.sha256 .artifacts/

      - name: Upload executable
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: CK3MPS-exe
          path: release/CK3MPS.exe

      - name: Upload release zip
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: CK3MPS-release-zip
          path: .artifacts/*.zip

      - name: Upload release checksums
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: CK3MPS-release-checksums
          path: .artifacts/*.sha256
