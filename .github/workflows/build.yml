name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  windows_build:
    name: Windows build
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: microsoft/setup-msbuild@6fb02220983dee41ce7ae257b6f4d8f9bf5ed4ce
      - shell: pwsh
        run: ./scripts/build.ps1
      - shell: pwsh
        run: |
          if (-not (Test-Path ./bin/CK3MPS.exe)) { throw 'Legacy build output missing.' }
      - if: success()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: CK3MPS-tested-bin
          path: bin/CK3MPS.exe
          if-no-files-found: error
      - if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: legacy-build-diagnostics
          path: |
            bin/msbuild.log
            bin/**/*.log
            obj/**/*.log
          if-no-files-found: ignore

  full_deterministic_test_suite:
    name: Full deterministic test suite
    needs: windows_build
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - shell: pwsh
        run: ./scripts/test-all.ps1
      - shell: pwsh
        run: ./scripts/test-safe-updater.ps1
      - shell: pwsh
        run: ./scripts/test-fix-result-contract.ps1
      - shell: pwsh
        run: ./scripts/test-release-smoke-report.ps1

  restore_ownership_security_tests:
    name: Restore ownership/security tests
    needs: windows_build
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - shell: pwsh
        run: ./scripts/test-restore-point-ownership.ps1

  mutation_integrity:
    name: Mutation allowlist/repository integrity checks
    needs: windows_build
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - shell: pwsh
        run: ./scripts/check-static-danger-strict.ps1
      - shell: pwsh
        run: ./scripts/check-version-consistency.ps1
      - shell: pwsh
        run: ./scripts/validate-release.ps1

  modern_compile_candidate:
    name: Modern compile candidate
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - shell: pwsh
        run: |
          dotnet build CK3MPS.SharedCore.csproj -c Release
          dotnet build CK3MPS.Modern.csproj -c Release
          dotnet test tests/CK3MPS.SharedCore.Tests.csproj -c Release
      - if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: modern-build-diagnostics
          path: |
            artifacts/**
            **/bin/Release/**
            **/obj/Release/**
          if-no-files-found: ignore

  approved_pr_builds:
    name: Approved PR builds
    if: github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $prs = gh pr list --state open --json number,reviewDecision,headRefName --jq '.[] | select(.reviewDecision == "APPROVED") | [.number,.headRefName] | @tsv'
          foreach ($line in $prs) {
            $parts = $line -split "`t"
            gh pr checkout $parts[0] --force
            ./scripts/build.ps1
            if (-not (Test-Path ./bin/CK3MPS.exe)) { throw "PR #$($parts[0]) build output missing." }
          }

  ci_required_checks_complete:
    name: CI required checks complete
    if: always()
    needs: [windows_build, full_deterministic_test_suite, restore_ownership_security_tests, mutation_integrity, modern_compile_candidate]
    runs-on: ubuntu-latest
    steps:
      - shell: bash
        run: |
          test '${{ needs.windows_build.result }}' = success
          test '${{ needs.full_deterministic_test_suite.result }}' = success
          test '${{ needs.restore_ownership_security_tests.result }}' = success
          test '${{ needs.mutation_integrity.result }}' = success
          test '${{ needs.modern_compile_candidate.result }}' = success
