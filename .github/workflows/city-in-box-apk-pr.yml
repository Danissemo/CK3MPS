name: Build CityInBox APK PR

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'city-in-box/**'

permissions:
  contents: read

jobs:
  android_apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'
      - name: Build Android APK
        run: gradle -p city-in-box --no-daemon :app:assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: city-in-box-apk
          path: city-in-box/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
