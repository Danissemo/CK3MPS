name: Feature request
description: Suggest a useful stabilization improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: idea
    attributes:
      label: Idea
      description: What should CK3MPS add or improve?
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Why it helps CK3 multiplayer stability
      description: Explain the OOS, launcher, network, Windows or CK3 setting risk this addresses.
  - type: textarea
    id: source
    attributes:
      label: Evidence or reference
      description: Link documentation, logs, reports, or reproducible behavior when available.
